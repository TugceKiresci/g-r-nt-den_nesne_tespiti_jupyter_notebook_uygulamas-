<!DOCTYPE html>
<html>
<head>
    <title>LIDAR Dataset Dosyaları</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background-color: #2c2c2c;
            padding: 10px 20px;
            margin: 10px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>📦 Kayıtlı LIDAR Dataset Dosyaları</h1>
    <ul>
        {% for file in files %}
            <li>
                {{ file }}
                <a href="/api/download-lidar-file/{{ file }}">İndir</a>
            </li>
        {% empty %}
            <li>Hiç CSV dosyası bulunamadı.</li>
        {% endfor %}
    </ul>
</body>
</html>
